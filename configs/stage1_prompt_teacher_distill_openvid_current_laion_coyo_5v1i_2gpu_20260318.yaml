run:
  seed: 1234
  output_dir: output/stage1_prompt_distill_openvid_current_laion_coyo_gemma_teacher_5v1i_20260318_2gpu
  log_every: 50
  save_every_steps: 5000
  num_workers: 0
  precision: bf16
  auto_download_pretrained: true
  auto_download_sana: true
  auto_download_smolvlm2: true
  strict_sana_parity_text_path: true
  strict_fail_fast_mask: true
model:
  student:
    text_encoder:
      ckpt_path: omni_ckpts/smolvlm2_500m/smolvlm2_500m.pt
      max_length: 512
      tokenizer_model_id: HuggingFaceTB/SmolVLM-Instruct
      train_top_layers: 2
      train_final_norm: true
      train_embeddings: false
    vision_head_frozen: true
    use_vision_head: false
    conditioner_bridge:
      out_seq_len: 300
      out_dim: 2304
    adapter_ckpt_dir: null
    adapter_in_channels: 960
    adapter_out_channels: 2304
    adapter_query_length: 128
    force_adapter_query_length: 128
    smol_vh_num_queries: 1
    adapter_num_encoder_layers: 2
    adapter_num_decoder_layers: 2
    adapter_ff_mult: 2
    resampler_num_heads: 8
    resampler_mlp_mult: 2
    gate_min_value: 0.0
    lora:
      enable: true
      r: 16
      alpha: 32
      dropout: 0.05
      target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
      exclude_patterns:
      - vision_model
    projector:
      type: mcp_full
      mcp_hidden_dim: 1536
      mcp_num_fuse_layers: 4
      mcp_use_refine: true
      mcp_refine_kernel_size: 3
      mcp_fusion_temperature: 1.0
sana:
  config: configs/sana_video_config/Sana_2000M_480px_AdamW_fsdp_nocfgdrop.yaml
  dit_ckpt: omni_ckpts/sana_video_2b_480p
  timesteps:
    num_train_timesteps: 1000
data:
  sources:
  - type: csv
    path: data/mix/manifests/joint_openvid_current_laion_coyo_20260315_video.csv
    weight: 5.0
    text_field_candidates: [caption]
  - type: csv
    path: data/mix/manifests/joint_openvid_current_laion_coyo_20260315_image.csv
    weight: 1.0
    text_field_candidates: [caption]
  batching:
    batch_size: 8
    grad_accum_steps: 1
    shuffle: true
    drop_last: true
  preprocessing:
    streaming: false
    normalize_whitespace: true
    strip: true
    remove_double_newlines: true
    use_chi_prompt: false
    motion_score: 10
    prompt_dropout_prob: 0.0
    span_mask_prob: 0.0
    span_mask_max_tokens: 16
    length_curriculum:
      enabled: false
      phase0_steps: 0
      phase1_steps: 0
      short_max_tokens: 64
      medium_max_tokens: 128
train:
  total_steps: 50000
  optimizer:
    betas: [0.9, 0.999]
    eps: 1.0e-08
    weight_decay: 0.0
  lr:
    conditioner_bridge: 5.0e-05
    text_encoder: 2.0e-05
    warmup_steps: 1000
    min_lr_ratio: 0.1
    max_grad_norm: 0.5
loss:
  embed:
    mse_weight: 1.0
    cos_weight: 0.5
    stat_weight: 0.1
    rel_weight: 0.1
    nce_weight: 0.05
    nce_temperature: 0.07
    use_attention_mask: true
    calibrate_to_teacher: false
    calibration_eps: 1.0e-06
  effect:
    enabled: false
    weight: 0.0
    batch_size: null
    num_timesteps_per_batch: 1
    timestep_ranges: []
    weight_schedule: null
  cfg:
    enabled: false
    weight: 0.0
    batch_size: null
    negative_prompt: ""
    guidance_scale_sampler:
      min: 1.0
      max: 1.0
