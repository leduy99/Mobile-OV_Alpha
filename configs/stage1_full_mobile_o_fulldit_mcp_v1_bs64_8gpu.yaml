run:
  seed: 1234
  output_dir: output/stage1_full_mobile_o_fulldit_mcp_v1_bs64_8gpu
  log_every: 10
  save_every_steps: 5000
  latest_save_every_steps: 500
  num_workers: 0
  precision: bf16
  auto_download_pretrained: true
  auto_download_sana: true
  auto_download_smolvlm2: true
  gradient_checkpointing: true
  fsdp_disable_flash_sdp: false
  fsdp_disable_grad_checkpointing: false
  student_ddp: false
  student_fsdp: false
  student_sync: false
  dit_sync: false
  require_dit_sharding: false
  allow_manual_dit_sync: false
  manual_sync_backend: nccl
  use_barrier: false
  resume_skip_optimizer_state: true
  dit_ddp_find_unused_parameters: false
  student_ddp_find_unused_parameters: false
  sync_bucket_max_elems: 25000000
  log_lora_grad: false
  debug_probe_every_steps: 200
  cfg_dropout_prob: 0.0
  cfg_delta_every_steps: 0
  cfg_delta_uncond_prompt: ''
  cfg_uncond_detach_bridge: true
  cfg_uncond_fixed_eval: true
  strict_sana_parity_text_path: true
  strict_fail_fast_mask: true
  conditioning_diag_every_steps: 200
  conditioning_diag_shuffle: true
  conditioning_diag_uncond: true
  conditioning_diag_grad: true
  conditioning_pred_probe_every_steps: 200
  debug_probe_prompts:
  - zoomed in view of Eggless Kitchen Sink Cookies showing chocolate chips, walnuts
    and M&M's
  - little girls laughing in the street, Qeshm Island, Salakh, Iran
  - landscape of illuminated liberty bridge and parliament building at night, hungary,
    Budapest
  - The ingredients for this green lentil soup are arranged over a white marble table.
  conditioning_pred_probe_prompts:
  - zoomed in view of Eggless Kitchen Sink Cookies showing chocolate chips, walnuts
    and M&M's
  - little girls laughing in the street, Qeshm Island, Salakh, Iran
  - landscape of illuminated liberty bridge and parliament building at night, hungary,
    Budapest
  - The ingredients for this green lentil soup are arranged over a white marble table.
  strict_sana_use_full_text_window: true
  strict_sana_token_select_strategy: head_uniform_tail
  strict_sana_head_tokens: 96
  strict_sana_tail_tokens: 96
model:
  student:
    text_encoder:
      ckpt_path: omni_ckpts/smolvlm2_500m/smolvlm2_500m.pt
      max_length: 512
      tokenizer_model_id: HuggingFaceTB/SmolVLM-Instruct
    vision_head_frozen: true
    use_vision_head: false
    conditioner_bridge:
      out_seq_len: 300
      out_dim: 2304
    adapter_ckpt_dir: null
    adapter_in_channels: 960
    adapter_out_channels: 2304
    adapter_query_length: 128
    force_adapter_query_length: 128
    smol_vh_num_queries: 1
    adapter_num_encoder_layers: 2
    adapter_num_decoder_layers: 2
    adapter_ff_mult: 2
    resampler_num_heads: 8
    resampler_mlp_mult: 2
    gate_min_value: 0.0
    lora:
      enable: false
      r: 16
      alpha: 32
      dropout: 0.05
      target_modules:
      - q_proj
      - v_proj
    projector:
      type: mcp_full
      mcp_hidden_dim: 1536
      mcp_num_fuse_layers: 4
      mcp_use_refine: true
      mcp_refine_kernel_size: 3
      mcp_fusion_temperature: 1.0
      mcp_lexical_gate_init: 0.2
      pre_dit_layernorm: false
  dit:
    train_modules:
    - all
    fsdp: false
    fsdp_sharding_strategy: full_shard
    ddp: false
    deepspeed: false
    deepspeed_config: configs/train_config/zero1_config.json
    deepspeed_zero_stage: 0
    deepspeed_dist_init_required: false
    chunk_index: null
    lora:
      enable: false
      r: 8
      alpha: 16
      dropout: 0.05
      target_modules:
      - q_linear
      - kv_linear
      - proj
      include_patterns:
      - cross_attn
sana:
  config: configs/sana_video_config/Sana_2000M_480px_AdamW_fsdp_nocfgdrop.yaml
  dit_ckpt: omni_ckpts/sana_video_2b_480p
  timesteps:
    num_train_timesteps: 1000
data:
  openvid:
    csv_path: data/full_mobile-o/manifests/journeydb_short_caption_train_ready.csv
    csv_path_video: data/full_mobile-o/manifests/journeydb_short_caption_train_ready.csv
    csv_path_image: data/full_mobile-o/manifests/journeydb_short_caption_train_ready.csv
    video_dir: .
    preprocessed_dir: null
    use_preprocessed: true
    max_samples: null
    expected_latent_t: 1
    expected_frame_num: 1
  joint:
    enabled: false
    image_per_video: 0
    interval: 0
    video_modality: image
    image_modality: image
    image_max_samples: null
  preprocessing:
    normalize_whitespace: true
    strip: true
    remove_double_newlines: true
    use_chi_prompt: false
    use_prompt_templates: false
    max_prompt_tokens: null
  motion_score: 10
  prompt_templates:
  - 'A video of {prompt}. motion score: {motion_score}.'
  - 'Video: {prompt}. motion score: {motion_score}.'
  - '{prompt}. motion score: {motion_score}.'
  - 'A short video clip of {prompt}. motion score: {motion_score}.'
  - 'A cinematic video of {prompt}. motion score: {motion_score}.'
  batching:
    batch_size: 64
    batch_size_image: 64
    grad_accum_steps: 1
    shuffle: true
    drop_last: false
train:
  total_steps: 2000000
  flow_shift: 3.0
  latent_window:
    frames: null
  use_sana_process_timesteps: false
  force_ivjoint_timestep: true
  chunk_sampling_strategy: uniform
  same_timestep_prob: 0.0
  timestep_weight: false
  lr_schedule: constant
  lr_schedule_args:
    num_warmup_steps: 0
  optimizer:
    betas:
    - 0.9
    - 0.999
    eps: 1.0e-08
    weight_decay: 0.0
  lr:
    bridge: 5.0e-05
    dit: 1.0e-05
    warmup_steps: 0
    min_lr_ratio: 0.1
    max_grad_norm: 0.1
loss:
  aux_start_step: 1
  diff:
    weight: 1.0
  distill:
    enabled: true
    use_attention_mask: true
    target_space: sana_post_ynorm
    freeze_sana_conditioner: true
    token_mse_weight: 1.0
    token_cos_weight: 0.5
    pooled_cos_weight: 0.2
    every_steps: 1
    skip_missing: false
    missing_warn_every: 200
    online_fallback_on_missing: true
    online_use_chi_prompt: false
    precomputed:
      dir: null
      preload: false
      max_cached_shards: 2
    contrastive_weight: 0.1
    contrastive_temperature: 0.07
    hidden0_geom_weight: 0.05
    hidden0_geom_layernorm: true
  semantic_probe:
    enabled: false
    weight: 0.2
    var_weight: 1.0
    cov_weight: 0.05
    geom_weight: 1.0
    target_std: 1.0
    every_steps: 5
    max_prompts: 8
    prompts: []
  norm:
    enabled: false
    weight: 0.0
    target: 48.0
  gate:
    enabled: false
    weight: 0.0
    target: 1.0
  functional:
    enabled: true
    pred_mse_weight: 0.05
    pred_cos_weight: 0.02
    every_steps: 1
